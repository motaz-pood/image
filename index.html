<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر البورجي للأحذية الراقية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .gold-bg { background: linear-gradient(135deg, #D4AF37 0%, #AA8A2E 100%); }
        .gold-text { color: #D4AF37; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <header class="sticky top-0 z-50 bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold">متجر <span class="gold-text">البورجي</span></h1>
            <div class="relative">
                <button onclick="toggleCart()" class="p-2 bg-gray-100 rounded-full">🛒 <span id="cart-count" class="bg-red-500 text-white text-xs rounded-full px-1">0</span></button>
            </div>
        </div>
    </header>

    <section class="py-10 text-center bg-stone-50">
        <h2 class="text-3xl font-bold mb-2">أحذية وصنادل راقية</h2>
        <p class="text-gray-500">سعر موحد لجميع الصنادل: 1500 ريال</p>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6" id="products-grid"></main>

    <div id="cart-sidebar" class="fixed inset-y-0 left-0 w-full md:w-80 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 p-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">سلة الطلبات</h3>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="space-y-4 mb-6"></div>
        <div class="border-t pt-4">
            <p class="text-lg font-bold flex justify-between"><span>الإجمالي:</span> <span id="cart-total">0</span> ريال</p>
            <button onclick="sendOrder()" class="w-full mt-4 gold-bg text-white py-3 rounded-xl font-bold">تأكيد الطلب (واتساب)</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "صندل ملكي بني", img: "./file_000000007604720a91467b4b3c7dbd22.png" },
            { id: 2, name: "صندل فاخر", img: "./1772641723619.png" },
            { id: 3, name: "صندل أنيق", img: "./file_0000000062c0724684d40e3701b3a88d.png" },
            { id: 4, name: "صندل كلاسيك", img: "./1772637130186.png" },
            { id: 5, name: "صندل أسود مودرن", img: "./1772641477765.png" },
            { id: 6, name: "صندل راحة تامة", img: "./1772590382639.png" },
            { id: 7, name: "صندل البورجي الخاص", img: "./1772590225469.png" }
        ];

        let cart = [];
        const grid = document.getElementById('products-grid');

        products.forEach(p => {
            grid.innerHTML += `
                <div class="border rounded-2xl overflow-hidden shadow-sm p-4">
                    <img src="${p.img}" class="w-full h-64 object-cover rounded-xl mb-4" onerror="this.src='https://via.placeholder.com/300?text=Image+Not+Found'">
                    <h4 class="font-bold mb-2">${p.name}</h4>
                    <div class="flex justify-between items-center">
                        <span class="font-bold gold-text">1500 ريال</span>
                        <button onclick="addToCart(${p.id})" class="bg-black text-white px-4 py-2 rounded-lg text-sm">أضف للسلة</button>
                    </div>
                </div>`;
        });

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const items = document.getElementById('cart-items');
            items.innerHTML = cart.map(i => `<div class="flex justify-between text-sm border-b pb-2"><span>${i.name}</span><span>1500 ريال</span></div>`).join('');
            document.getElementById('cart-total').innerText = cart.length * 1500;
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('-translate-x-full');
        }

        function sendOrder() {
            if(cart.length === 0) return alert('السلة فارغة!');
            const text = encodeURIComponent(`مرحباً متجر البورجي، أريد طلب:\n${cart.map(i => i.name).join('\n')}\nإجمالي السعر: ${cart.length * 1500} ريال`);
            window.open(`https://wa.me/967734229097?text=${text}`);
        }
    </script>
</body>
</html>
